# HTTP → HTTPS 重定向（根域名 + www）
server {
    listen 80;
    server_name fysxq.lat www.fysxq.lat;
    return 301 https://fysxq.lat$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl;
    server_name fysxq.lat www.fysxq.lat;

    # SSL 证书（certbot 自动填写）
    ssl_certificate     /etc/letsencrypt/live/fysxq.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fysxq.lat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 反向代理到 Next.js（pnpm start 监听 3001）
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Next.js 静态资源加缓存
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_cache_valid  200 1y;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    access_log off;
    error_log  /var/log/nginx/projects-hub_error.log warn;
}
